<!DOCTYPE html>
<html lang="my">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thai 2D Calendar</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      font-family: 'Pyidaungsu', 'Myanmar Text', sans-serif; 
      background: #e8ecef; 
      padding: 10px; 
    }
    
    .container {
      max-width: 100%;
      background: #fff;
      border: 1px solid #999;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      overflow: hidden;
      border-radius: 8px;
    }

    .header {
      background: linear-gradient(135deg, #003366 0%, #0055aa 100%);
      color: #fff;
      text-align: center;
      padding: 12px;
      font-weight: bold;
      font-size: 15px;
      letter-spacing: 1px;
    }

    .toggle-buttons {
      display: flex;
      background: #f0f0f0;
      padding: 8px;
      gap: 10px;
      justify-content: center;
      border-bottom: 1px solid #ddd;
    }

    .toggle-btn {
      flex: 1;
      max-width: 220px;
      padding: 10px;
      border: 2px solid #003366;
      background: #fff;
      color: #003366;
      font-weight: bold;
      cursor: pointer;
      border-radius: 6px;
    }

    .toggle-btn.active {
      background: #003366;
      color: #fff;
    }

    .table-wrapper {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    .calendar-grid {
      border-collapse: collapse;
      width: 100%;
      min-width: 800px;
      font-size: 11px;
    }

    .calendar-grid th, .calendar-grid td {
      border: 1px solid #c0d0e0;
      padding: 6px 4px;
      text-align: center;
      vertical-align: top;
    }

    .calendar-grid th {
      background: #003366;
      color: #fff;
      font-weight: bold;
      height: 30px;
      font-size: 12px;
    }

    /* ပထမကော်လံ (Week Label) */
    .week-label {
      background: #003366;
      color: #fff;
      font-weight: bold;
      min-width: 60px;
      text-align: center !important;
      vertical-align: middle !important;
    }

    /* ဂဏန်းများ */
    .day-cell {
      background: #fff;
      min-width: 120px;
    }

    .date-num {
      font-weight: bold;
      font-size: 13px;
      color: #003366;
      margin-bottom: 4px;
    }

    .numbers-list {
      font-family: monospace;
      font-size: 10px;
      line-height: 1.4;
      word-wrap: break-word;
    }

    .morning-nums {
      color: #d93025;
      margin-bottom: 4px;
    }

    .evening-nums {
      color: #188038;
    }

    .empty-cell {
      background: #f5f5f5;
      color: #ccc;
    }

    .mobile-hint {
      text-align: center;
      font-size: 11px;
      color: #666;
      padding: 6px;
      background: #f9f9f9;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="header">SPECIAL THAI TWO DIGIT NUMBERS CALENDAR</div>
  
  <div class="toggle-buttons">
    <button class="toggle-btn active" onclick="switchView('morning', this)">☀️ နံနက် (9:30 AM)</button>
    <button class="toggle-btn" onclick="switchView('evening', this)">🌙 ညနေ (4:30 PM)</button>
    <button class="toggle-btn" onclick="switchView('both', this)">🔄 နှစ်ခုလုံး</button>
  </div>

  <div class="table-wrapper">
    <table class="calendar-grid" id="calendarTable">
      <thead>
        <tr id="headerRow">
          <th>WEEK</th>
          <th>MON</th>
          <th>TUE</th>
          <th>WED</th>
          <th>THU</th>
          <th>FRI</th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <!-- JavaScript ဖြင့် ဖြည့်မည် -->
      </tbody>
    </table>
  </div>
  
  <div class="mobile-hint">📱 ဇယားကျယ်သဖြင့် ညာဘက်သို့ လက်နဲ့ဆွဲကြည့်ပါ</div>
</div>

<script>
  const JSON_URL = "https://raw.githubusercontent.com/2dmyanmarteam-droid/myanmar-2d-live/main/data/calendar-data.json";
  let currentData = {};
  let currentView = 'morning';

  function switchView(view, btn) {
    currentView = view;
    document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    buildTable();
  }

  function buildTable() {
    const tbody = document.getElementById('tableBody');
    tbody.innerHTML = '';
    
    const year = 2026;
    const month = 5; // June (0-indexed)
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    
    // ပထမရက်၏ နေ့ (0=Sun, 1=Mon...)
    let firstDayOfWeek = new Date(year, month, 1).getDay();
    // Mon(1) စဖို့ လိုအပ်သော ကွက်လပ်များ
    let startOffset = (firstDayOfWeek === 0) ? 6 : firstDayOfWeek - 1;

    let weekNum = 1;
    let row = document.createElement('tr');
    
    // ပထမကော်လံ (Week Label)
    let weekLabelTd = document.createElement('td');
    weekLabelTd.className = 'week-label';
    weekLabelTd.textContent = `Week ${weekNum}`;
    row.appendChild(weekLabelTd);

    // ကနး ကွက်လပ်များ (ပိတ်ရက်များ)
    for(let i=0; i<startOffset; i++) {
      let td = document.createElement('td');
      td.className = 'empty-cell';
      td.textContent = '-';
      row.appendChild(td);
    }

    let currentCol = startOffset; // 0=Mon, 1=Tue...

    for(let d=1; d<=daysInMonth; d++) {
      const dateObj = new Date(year, month, d);
      const dow = dateObj.getDay(); // 0=Sun, 6=Sat
      
      // စနေ/တနင်္ဂနွေ ကို ကျော်မယ်
      if(dow === 0 || dow === 6) continue;
      
      const dateKey = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const info = currentData[dateKey] || {};
      
      // ရက်နံပါတ် + ဂဏန်းများ
      let cellHtml = `<div class="date-num">${d}</div>`;
      
      let mNums = info.morning?.set || [];
      let eNums = info.evening?.set || [];
      
      if(currentView === 'morning' || currentView === 'both') {
        cellHtml += `<div class="numbers-list morning-nums">${mNums.join(' ')}</div>`;
      }
      if(currentView === 'evening' || currentView === 'both') {
        cellHtml += `<div class="numbers-list evening-nums">${eNums.join(' ')}</div>`;
      }
      
      let td = document.createElement('td');
      td.className = 'day-cell';
      td.innerHTML = cellHtml;
      row.appendChild(td);
      
      currentCol++;
      
      // သောကြာ (5) ရောက်ရင် Row အသစ် စမယ်
      if(currentCol >= 5) {
        tbody.appendChild(row);
        weekNum++;
        row = document.createElement('tr');
        weekLabelTd = document.createElement('td');
        weekLabelTd.className = 'week-label';
        weekLabelTd.textContent = `Week ${weekNum}`;
        row.appendChild(weekLabelTd);
        currentCol = 0;
      }
    }
    
    // နောက်ဆုံး Row ကို ထည့်ခြင်း
    if(row.children.length > 1) {
      while(row.children.length < 6) {
        let td = document.createElement('td');
        td.className = 'empty-cell';
        td.textContent = '-';
        row.appendChild(td);
      }
      tbody.appendChild(row);
    }
  }

  fetch(JSON_URL)
    .then(res => res.json())
    .then(data => {
      currentData = data;
      buildTable();
    })
    .catch(err => console.error(err));
</script>

</body>
</html>
