<!DOCTYPE html>
<html lang="my">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2D Paper Sheet</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: 'Pyidaungsu', 'Myanmar Text', sans-serif; margin: 0; padding: 0; background: #f0f2f5; color: #333; }
    
    .container { max-width: 100%; padding: 10px; }
    .sheet-title { text-align: center; font-size: 1.2rem; font-weight: bold; color: #003366; margin: 10px 0; letter-spacing: 1px; }
    
    /* ဇယားအိမ်ရာ (Scroll Wrapper) */
    .sheet-wrapper {
      background: #fff;
      border: 1px solid #ccc;
      border-radius: 8px;
      overflow-x: auto; /* ဖုန်းနဲ့ ညာဘက်ဆွဲကြည့်နိုင်ရန် */
      -webkit-overflow-scrolling: touch;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    /* စာရွက်ယားကွက် */
    .trade-sheet {
      border-collapse: collapse;
      width: 100%;
      min-width: 750px; /* ဇယားအကျယ်သေချာစေရန် */
      font-size: 13px;
    }

    .trade-sheet th, .trade-sheet td {
      border: 1px solid #b0b0b0;
      padding: 6px 4px;
      text-align: center;
      white-space: nowrap;
    }

    .trade-sheet th {
      background: #e8edf2;
      color: #003366;
      font-weight: 700;
      position: sticky;
      top: 0;
      z-index: 2;
    }

    /* ပထမကော်လံ (နေ့အမည်) ကပ်နေစေရန် */
    .day-col {
      position: sticky;
      left: 0;
      background: #f8f9fa;
      font-weight: bold;
      z-index: 3;
      min-width: 70px;
      text-align: left !important;
      padding-left: 10px !important;
      border-right: 2px solid #999;
    }

    .num-cell {
      font-family: monospace;
      font-weight: bold;
      font-size: 14px;
      color: #111;
      background: #fff;
    }
    .num-cell.empty { color: #ccc; }

    .mobile-hint { text-align: center; font-size: 12px; color: #666; margin-top: 8px; }
  </style>
</head>
<body>
<div class="container">
  <div class="sheet-title"> SPECIAL THAI SET TRADE NUMBERS</div>
  
  <div class="sheet-wrapper">
    <table class="trade-sheet" id="sheetTable">
      <thead>
        <tr id="headerRow"></tr>
      </thead>
      <tbody id="bodyRows"></tbody>
    </table>
  </div>
  <div class="mobile-hint">📱 ဇယားကြီးဖြစ်သဖြင့် ညာဘက်သို့ လက်နဲ့ဆွဲကြည့်ပါ</div>
</div>

<script>
  const JSON_URL = "https://raw.githubusercontent.com/2dmyanmarteam-droid/myanmar-2d-live/main/data/calendar-data.json";
  const dayNames = ['','တနင်္လာ', 'အင်္ဂါ', 'ုဒ္ဓဟူး', 'ကြာသပတေး', 'သောကြာ'];
  const headerRow = document.getElementById('headerRow');
  const bodyRows = document.getElementById('bodyRows');

  // 1. ခေါင်းစဉ် (1-31) ဖန်တီးခြင်း
  headerRow.innerHTML = '<th class="day-col">DAY</th>';
  for(let i=1; i<=31; i++) headerRow.innerHTML += `<th>${i}</th>`;

  // 2. အတန်း (Mon-Fri) ဖန်တီးခြင်း
  for(let d=1; d<=5; d++) {
    let rowHtml = `<td class="day-col">${dayNames[d]}</td>`;
    for(let c=1; c<=31; c++) {
      rowHtml += `<td id="cell-${d}-${c}" class="num-cell empty">-</td>`;
    }
    const tr = document.createElement('tr');
    tr.innerHTML = rowHtml;
    bodyRows.appendChild(tr);
  }

  // 3. JSON ဒေတာ ဆွဲယူပြီး ဇယားထဲဖြည့်ခြင်း
  fetch(JSON_URL)
    .then(res => res.json())
    .then(data => {
      for(const dateKey in data) {
        const dateObj = new Date(dateKey);
        const dow = dateObj.getDay(); // 1=Mon ... 5=Fri
        const dom = dateObj.getDate(); // 1...31

        if(dow >= 1 && dow <= 5 && dom <= 31) {
          const cell = document.getElementById(`cell-${dow}-${dom}`);
          if(cell) {
            // ဂဏန်းထုတ်ယူ (မorning.set ရဲ့ ပထမဆုံးဂဏန်းကို ပြမယ်)
            const num = data[dateKey].morning?.set?.[0] || '--';
            cell.textContent = num;
            cell.classList.remove('empty');
          }
        }
      }
    })
    .catch(err => console.error("Data load error:", err));
</script>
</body>
</html>
