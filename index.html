<!DOCTYPE html>
<html lang="my">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thai 2D Calendar Sheet</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      font-family: 'Pyidaungsu', 'Myanmar Text', sans-serif; 
      background: #e8ecef; 
      padding: 10px; 
    }
    .container {
      max-width: 100%;
      background: #fff;
      border: 1px solid #999;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      overflow: hidden;
      border-radius: 8px;
    }
    .header {
      background: linear-gradient(135deg, #003366 0%, #0055aa 100%);
      color: #fff;
      text-align: center;
      padding: 12px;
      font-weight: bold;
      font-size: 15px;
    }
    .toggle-buttons {
      display: flex;
      background: #f0f0f0;
      padding: 8px;
      gap: 10px;
      justify-content: center;
      border-bottom: 1px solid #ddd;
    }
    .toggle-btn {
      flex: 1;
      max-width: 220px;
      padding: 10px;
      border: 2px solid #003366;
      background: #fff;
      color: #003366;
      font-weight: bold;
      cursor: pointer;
      border-radius: 6px;
    }
    .toggle-btn.active {
      background: #003366;
      color: #fff;
    }
    .table-wrapper {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .trade-table {
      border-collapse: collapse;
      width: 100%;
      min-width: 1200px;
      font-size: 11px;
    }
    .trade-table th, .trade-table td {
      border: 1px solid #c0d0e0;
      padding: 6px 4px;
      text-align: center;
      white-space: nowrap;
      min-width: 50px;
    }
    .trade-table th {
      background: #003366;
      color: #fff;
      font-weight: bold;
      height: 30px;
      font-size: 11px;
      position: sticky;
      top: 0;
      z-index: 2;
    }
    .day-name-col {
      position: sticky;
      left: 0;
      background: #003366;
      color: #fff;
      font-weight: bold;
      z-index: 3;
      min-width: 100px;
      text-align: center !important;
    }
    .row-num-col {
      position: sticky;
      left: 100px;
      background: #fff;
      color: #003366;
      font-weight: bold;
      z-index: 3;
      min-width: 50px;
      text-align: center !important;
      border-right: 2px solid #003366;
    }
    .trade-table thead .day-name-col,
    .trade-table thead .row-num-col { 
      z-index: 4; 
      background: #003366;
      color: #fff;
    }
    .num-cell {
      font-family: monospace;
      font-weight: bold;
      font-size: 12px;
      color: #d93025;
      background: #fff;
    }
    .num-cell.evening {
      color: #188038;
    }
    .mobile-hint {
      text-align: center;
      font-size: 11px;
      color: #666;
      padding: 6px;
      background: #f9f9f9;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="header">SPECIAL THAI TWO DIGIT NUMBERS CALENDAR</div>
  <div class="toggle-buttons">
    <button class="toggle-btn active" onclick="switchView('morning', this)">☀️ နံနက် (9:30 AM)</button>
    <button class="toggle-btn" onclick="switchView('evening', this)">🌙 ညနေ (4:30 PM)</button>
  </div>
  <div class="table-wrapper">
    <table class="trade-table" id="calendarTable">
      <thead>
        <tr id="headerRow">
          <th class="day-name-col">နေ့</th>
          <th class="row-num-col">Row</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
  <div class="mobile-hint">📱 ဇယားကျယ်သဖြင့် ညာဘက်သို့ လက်နဲ့ဆွဲကြည့်ပါ</div>
</div>

<script>
  const dayNames = ['တနင်္လာ', 'အင်္ဂါ', 'ဗုဒ္ဓဟူး', 'ကြာသပတေး', 'သောကြာ'];
  const TOTAL_ROWS = 20;
  const MAX_COLS = 30; // Column 3-32 (ဂဏန်း ၃၀ လုံး)
  let currentView = 'morning';

  // ကော်လံ ခေါင်းစဉ် (Column 1-30)
  const headerRow = document.getElementById('headerRow');
  for(let i=1; i<=MAX_COLS; i++) {
    headerRow.innerHTML += `<th>${i}</th>`;
  }

  function switchView(view, btn) {
    currentView = view;
    document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    buildTable();
  }

  function buildTable() {
    const tbody = document.getElementById('tableBody');
    tbody.innerHTML = '';
    
    for(let row=1; row<=TOTAL_ROWS; row++) {
      const tr = document.createElement('tr');
      
      // Column A: နေ့အမည် (Mon-Fri လှည့်)
      const dayTd = document.createElement('td');
      dayTd.className = 'day-name-col';
      const dayIndex = (row - 1) % 5; // 0-4
      dayTd.textContent = dayNames[dayIndex];
      tr.appendChild(dayTd);
      
      // Column B: Row နံပါတ်
      const rowTd = document.createElement('td');
      rowTd.className = 'row-num-col';
      rowTd.textContent = row;
      tr.appendChild(rowTd);
      
      // Column C-∞: ဂဏန်းများ (formula: row + (col-1)×20)
      for(let col=1; col<=MAX_COLS; col++) {
        const td = document.createElement('td');
        const value = row + (col - 1) * 20;
        td.className = 'num-cell' + (currentView === 'evening' ? ' evening' : '');
        td.textContent = String(value).padStart(2, '0');
        tr.appendChild(td);
      }
      
      tbody.appendChild(tr);
    }
  }

  buildTable();
</script>

</body>
</html>
