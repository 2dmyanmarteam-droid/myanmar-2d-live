<!DOCTYPE html>
<html lang="my">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2D Paper View</title>
  <style>
    body { font-family: 'Pyidaungsu', 'Myanmar Text', sans-serif; margin: 0; padding: 10px; background: #e0e0e0; }
    
    /* စာရွက်ပုံစံ Container */
    .paper-sheet {
      background: white;
      max-width: 100%;
      overflow-x: auto; /* ုန်းနဲ့ဆို ဘေးတိုက်ဆွဲကြည့်နိုင်အောင် */
      padding: 10px;
      border: 1px solid #ccc;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
    }

    .paper-header {
      text-align: center;
      color: #003366;
      font-weight: bold;
      font-size: 16px;
      margin-bottom: 10px;
      border-bottom: 2px solid #003366;
      padding-bottom: 5px;
    }

    /* ဇယားကွက် ပုံစံ */
    .trade-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
      min-width: 600px; /* ကွန်ပျူတာမှာ အကျယ်ကြီး ပေါ်အောင် */
    }

    .trade-table th, .trade-table td {
      border: 1px solid #999;
      padding: 4px;
      text-align: center;
    }

    .trade-table th {
      background-color: #f0f0f0;
      color: #333;
      font-weight: bold;
    }

    /* တနင်္လာ-သောကြာ အရောင်ခွဲခြား */
    .row-mon { background-color: #fff; }
    .row-tue { background-color: #f9f9f9; }
    .row-wed { background-color: #fff; }
    .row-thu { background-color: #f9f9f9; }
    .row-fri { background-color: #fff; }

    .day-label {
      font-weight: bold;
      text-align: left !important;
      padding-left: 10px !important;
      width: 60px;
    }
    
    .num-cell {
      font-family: monospace;
      font-size: 14px;
      font-weight: bold;
      color: #000;
    }
    
    .empty-cell {
      background-color: #eee;
    }

    /* ဖုန်းအတွက် သတိပေးချက် */
    .mobile-note {
      font-size: 12px;
      color: #666;
      text-align: center;
      margin-top: 5px;
    }
  </style>
</head>
<body>

<div class="paper-sheet">
  <div class="paper-header">SPECIAL THAI SET TRADE NUMBERS</div>
  
  <!-- ဇယားကြီး -->
  <table class="trade-table" id="paperTable">
    <thead>
      <tr id="headerRow">
        <th>Day</th>
        <!-- 1 ကနေ 31 အထိ ကော်လံတွေ JS နဲ့ ြည့်မယ် -->
      </tr>
    </thead>
    <tbody>
      <tr class="row-mon"><td class="day-label">MON</td><td id="mon-1"></td><td id="mon-2"></td>...</tr>
      <tr class="row-tue"><td class="day-label">TUE</td><td id="tue-1"></td><td id="tue-2"></td>...</tr>
      <tr class="row-wed"><td class="day-label">WED</td><td id="wed-1"></td><td id="wed-2"></td>...</tr>
      <tr class="row-thu"><td class="day-label">THU</td><td id="thu-1"></td><td id="thu-2"></td>...</tr>
      <tr class="row-fri"><td class="day-label">FRI</td><td id="fri-1"></td><td id="fri-2"></td>...</tr>
    </tbody>
  </table>
  
  <div class="mobile-note">📱 ဇယားကြီးဖြစ်လို့ ဘေးဘက်ကို ဆွဲကြည့်ပါ</div>
</div>

<script>
  // JSON URL (မင်းရဲ့ GitHub Link)
  const JSON_URL = "https://raw.githubusercontent.com/2dmyanmarteam-droid/myanmar-2d-live/main/data/calendar-data.json";

  // ဇယားခေါင်းစဉ် (1-31) ဖန်တီးခြင်း
  const headerRow = document.getElementById('headerRow');
  for(let i=1; i<=31; i++) {
    const th = document.createElement('th');
    th.textContent = i;
    headerRow.appendChild(th);
  }

  fetch(JSON_URL)
    .then(res => res.json())
    .then(data => {
      // Data တွေကို ဇယားထဲ ြည့်သွင်းခြင်း
      for(const dateKey in data) {
        // dateKey = "2026-06-01"
        const dateObj = new Date(dateKey);
        const dayOfMonth = dateObj.getDate(); // 1, 2, 3...
        const dayOfWeek = dateObj.getDay(); // 0=Sun, 1=Mon...

        // စနေ (6) ဲ့ တနင်္ဂနွေ (0) ကို ဖယ်ထုတ် (ပိတ်ရက်မို့)
        if(dayOfWeek === 0 || dayOfWeek === 6) continue;

        // ဂဏန်းထုတ်ယူခြင်း (Morning Set ကို ဥပမာယူမယ်)
        // မင်းရဲ့ JSON structure အတိုင်း နေရာယူပါ
        let num = data[dateKey].morning?.set?.[0] || "--"; 
        
        // ဇယားထဲ ထည့်မယ် (ဥပမာ: mon-1, tue-2)
        let rowPrefix = "";
        if(dayOfWeek === 1) rowPrefix = "mon";
        else if(dayOfWeek === 2) rowPrefix = "tue";
        else if(dayOfWeek === 3) rowPrefix = "wed";
        else if(dayOfWeek === 4) rowPrefix = "thu";
        else if(dayOfWeek === 5) rowPrefix = "fri";

        const cellId = `${rowPrefix}-${dayOfMonth}`;
        const cell = document.getElementById(cellId);
        if(cell) {
          cell.textContent = num;
          cell.classList.add('num-cell');
        }
      }
    })
    .catch(err => console.error("Error loading data", err));
</script>

</body>
</html>
