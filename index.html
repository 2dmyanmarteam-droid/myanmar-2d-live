<!DOCTYPE html>
<html lang="my">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thai 2D Calendar Sheet</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f0f0f0; padding: 10px; }
    
    /* စာရွက်ကြီး Container */
    .paper-container {
      background: #fff;
      max-width: 100%;
      overflow-x: auto; /* ဖုန်းနဲ့ ဘေးဆွဲကြည့်နိုင်ရန် */
      border: 1px solid #999;
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }

    /* ခေါင်းစဉ် */
    .sheet-header {
      background: #e6f2ff;
      color: #004080;
      text-align: center;
      padding: 8px;
      font-weight: bold;
      font-size: 16px;
      border-bottom: 2px solid #004080;
    }

    /* ဇယားကွက် */
    .trade-table {
      border-collapse: collapse;
      width: 100%;
      min-width: 800px; /* ဇယားအကျယ်သေချာစေရန် */
      font-size: 11px; /* စာလုံးသေးသေးလေးနဲ့ စည်းကမ်းကျကျ */
    }

    .trade-table th, .trade-table td {
      border: 1px solid #b0c4de;
      padding: 4px 2px;
      text-align: center;
      vertical-align: top;
      white-space: pre-wrap; /* ဂဏန်းများကို အတန်းလိုက် ပြရန် */
    }

    /* ခေါင်းစဉ်တန်း (1-31) */
    .trade-table th {
      background: #003366;
      color: #fff;
      font-weight: bold;
      height: 25px;
    }

    /* ဘယ်ဘက် ကော်လံ (MON, TUE...) */
    .row-header {
      background: #003366;
      color: #fff;
      font-weight: bold;
      width: 40px;
      position: sticky;
      left: 0;
      z-index: 2;
    }

    /* ဂဏန်းများ */
    .cell-content {
      color: #000;
      line-height: 1.2;
    }
    .cell-content b { color: #d93025; } /* ထူးထူးခြားခြား ပြချင်ရင် */

    /* စနေ/တနင်္ဂနွေ နေရာလွတ် (ပိတ်ရက်) */
    .holiday-cell {
      background: #f4f4f4;
      color: #ccc;
    }
  </style>
</head>
<body>

<div class="paper-container">
  <div class="sheet-header">SPECIAL THAI TWO DIGIT NUMBERS CALENDAR</div>
  
  <table class="trade-table" id="calendarSheet">
    <thead>
      <tr id="headerRow">
        <th>DAY</th>
        <!-- 1 မှ 31 အထိ JS ဖြင့် ဖြည့်မည် -->
      </tr>
    </thead>
    <tbody id="tableBody">
      <!-- MON, TUE, WED, THU, FRI အတန်းများ -->
    </tbody>
  </table>
</div>

<script>
  // ဇယားခေါင်းစဉ် (1-31) ထည့်ခြင်း
  const headerRow = document.getElementById('headerRow');
  for(let i=1; i<=31; i++) {
    headerRow.innerHTML += `<th>${i}</th>`;
  }

  // အတန်း () တန်း ဖန်တီးခြင်း (Mon-Fri)
  const days = ['MON', 'TUE', 'WED', 'THU', 'FRI'];
  const tableBody = document.getElementById('tableBody');
  
  days.forEach((dayName, index) => {
    const tr = document.createElement('tr');
    // ဘယ်ဘက် ခေါင်းစဉ်
    tr.innerHTML = `<td class="row-header">${dayName}</td>`;
    
    //  မှ ၃၁ အထိ ကွက်လပ်များ
    for(let d=1; d<=31; d++) {
      // တစ်လရဲ့ ရက်စွဲနဲ့ နေ့ ကိုက်ညီမှု ရှိ/မရှိ စစ်ဆေးရန်
      // ဥပမာ: MON တန်းမှာ ရက် ၁, ၈, ၅... ပဲ ပြမယ်
      tr.innerHTML += `<td id="cell-${index}-${d}" class="cell-content"></td>`;
    }
    tableBody.appendChild(tr);
  });

  // ဒေတာဖြည့်သွင်းခြင်း (ဥပမာ - မင်း JSON ထဲက ဂဏန်းတွေ)
  // မင်းရဲ့ JSON format နဲ့ ကိုက်ညီအောင် ပြင်ဆင်ပေးထားပါတယ်
  const sampleData = {
     "2026-06-01": { morning: { set: ["84", "65", "34", "99", "64"] } },
     "2026-06-02": { morning: { set: ["73", "92", "22", "20", "47"] } },
     // ... အခြားရက်များ ...
  };

  // တကယ့် JSON ကို ဆွဲယူခြင်း
  const JSON_URL = "https://raw.githubusercontent.com/2dmyanmarteam-droid/myanmar-2d-live/main/data/calendar-data.json";
  
  fetch(JSON_URL)
    .then(res => res.json())
    .then(data => {
      for(const dateKey in data) {
        const dateObj = new Date(dateKey);
        const dayOfMonth = dateObj.getDate(); // 1-31
        const dayOfWeek = dateObj.getDay(); // 0=Sun, 1=Mon... 5=Fri, 6=Sat

        // စနေ (6) နဲ့ တနင်္ဂနွေ (0) ကို ဖြုတ်ထားပြီးသား ဇယားဖြစ်လို့
        // Mon(1) ကို Row 0, Tue(2) ကို Row 1... အနေနဲ့ ညှိမယ်
        if(dayOfWeek >= 1 && dayOfWeek <= 5) {
          const rowIndex = dayOfWeek - 1; // 0 to 4
          const colIndex = dayOfMonth;    // 1 to 31
          
          const cell = document.getElementById(`cell-${rowIndex}-${colIndex}`);
          if(cell) {
            // ဂဏန်းများကို ထည့်သွင်းခြင်း (Set Trade အဓိကထား)
            // မင်းလိုချင်ရင် Internet numbers တွေကိုပါ ထပ်ထည့်နိုင်ပါတယ်
            let nums = data[dateKey].morning?.set || [];
            cell.innerHTML = nums.join(" "); // ဂဏန်းတွေကို စီစီညာညာ ပြမယ်
          }
        }
      }
    })
    .catch(err => console.error(err));
</script>
</body>
</html>
