<!DOCTYPE html>
<html lang="my">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thai 2D Calendar</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      font-family: 'Pyidaungsu', 'Myanmar Text', sans-serif; 
      background: #e0e0e0; 
      padding: 10px; 
    }
    
    .container {
      max-width: 100%;
      background: #fff;
      border: 1px solid #999;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      overflow: hidden;
    }

    .header {
      background: #003366;
      color: #fff;
      text-align: center;
      padding: 10px;
      font-weight: bold;
      font-size: 14px;
      letter-spacing: 1px;
    }

    /* ခလုတ်များ */
    .toggle-buttons {
      display: flex;
      background: #f0f0f0;
      padding: 8px;
      gap: 10px;
      justify-content: center;
    }

    .toggle-btn {
      flex: 1;
      max-width: 200px;
      padding: 8px;
      border: 2px solid #003366;
      background: #fff;
      color: #003366;
      font-weight: bold;
      cursor: pointer;
      border-radius: 5px;
    }

    .toggle-btn.active {
      background: #003366;
      color: #fff;
    }

    .table-wrapper {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    .trade-table {
      border-collapse: collapse;
      width: 100%;
      min-width: 1000px;
      font-size: 11px;
    }

    .trade-table th, .trade-table td {
      border: 1px solid #b0c4de;
      padding: 4px 2px;
      text-align: center;
      white-space: nowrap;
      min-width: 30px;
    }

    /* ခေါင်းစ်တန်း (အပြာရောင်နောက်ခံ + အဖြူစာသား) */
    .trade-table th {
      background: #003366;
      color: #ffffff; /* ✅ အဖြူရောင် */
      font-weight: bold;
      height: 30px;
      font-size: 10px;
    }

    /* ဘယ်ဘက်ကော်လံ (Day) (အပြာရောင်နောက်ခံ + အဖြူစာသား) */
    .day-col {
      position: sticky;
      left: 0;
      background: #003366;
      color: #ffffff; /* ✅ အဖြူရောင် */
      font-weight: bold;
      z-index: 2;
      min-width: 60px;
      text-align: center !important;
    }

    .trade-table thead .day-col {
      z-index: 3;
    }

    /* ဂဏန်းများ */
    .num-cell {
      font-family: monospace;
      font-weight: bold;
      font-size: 12px;
      color: #000000; /* ✅ အနက်ရောင် */
      background: #ffffff;
    }
    
    .num-cell.evening {
      color: #008000; /* ✅ ညနေအတွက် အစိမ်းရောင် */
    }

    .mobile-hint {
      text-align: center;
      font-size: 11px;
      color: #666;
      padding: 5px;
      background: #f9f9f9;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="header">SPECIAL THAI TWO DIGIT NUMBERS CALENDAR</div>
  
  <div class="toggle-buttons">
    <button class="toggle-btn active" onclick="switchView('morning', this)">☀️ နံနက် (9:30 AM)</button>
    <button class="toggle-btn" onclick="switchView('evening', this)">🌙 ညနေ (4:30 PM)</button>
  </div>

  <div class="table-wrapper">
    <table class="trade-table" id="calendarTable">
      <thead>
        <tr id="headerRow">
          <th class="day-col">DAY</th>
          <!-- 1-30 ကော်လံများ -->
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
  
  <div class="mobile-hint">📱 ဇယားကျယ်သဖြင့် ညာဘက်သို့ လက်နဲ့ဆွဲကြည့်ပါ</div>
</div>

<script>
  const JSON_URL = "https://raw.githubusercontent.com/2dmyanmarteam-droid/myanmar-2d-live/main/data/calendar-data.json";
  let currentData = {};
  let currentView = 'morning';

  // ခေါင်းစဉ်တန်း (1-30) ဖန်တီးခြင်း
  const headerRow = document.getElementById('headerRow');
  for(let i=1; i<=30; i++) {
    headerRow.innerHTML += `<th>${i}</th>`;
  }

  function switchView(view, btn) {
    currentView = view;
    document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    buildTable();
  }

  function buildTable() {
    const tbody = document.getElementById('tableBody');
    tbody.innerHTML = '';
    
    const myanDayNames = ['','တနင်္လာ', 'အင်္ဂါ', 'ဗုဒ္ဓဟူး', 'ကြာသပတေး', 'သောကြာ'];
    
    let workingDayCount = 0;
    const year = 2026;
    const month = 5; // June
    const daysInMonth = new Date(year, month + 1, 0).getDate();

    for(let d=1; d<=daysInMonth && workingDayCount < 20; d++) {
      const dateObj = new Date(year, month, d);
      const dow = dateObj.getDay();
      
      if(dow === 0 || dow === 6) continue;
      
      workingDayCount++;
      
      const dateKey = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const info = currentData[dateKey] || {};
      
      let numbers = [];
      if(currentView === 'morning') {
        numbers = info.morning?.set || [];
      } else {
        numbers = info.evening?.set || [];
      }
      
      const tr = document.createElement('tr');
      
      // ဘယ်ဘက်ကော်လံ (Day)
      const dayTd = document.createElement('td');
      dayTd.className = 'day-col';
      dayTd.innerHTML = `${workingDayCount}<br><small style="font-size:9px">${myanDayNames[dow]}</small>`;
      tr.appendChild(dayTd);
      
      // ဂဏန်းများ (1-30)
      for(let col=1; col<=30; col++) {
        const td = document.createElement('td');
        td.className = 'num-cell' + (currentView === 'evening' ? ' evening' : '');
        td.textContent = numbers[col-1] || '';
        tr.appendChild(td);
      }
      
      tbody.appendChild(tr);
    }
  }

  fetch(JSON_URL)
    .then(res => res.json())
    .then(data => {
      currentData = data;
      buildTable();
    })
    .catch(err => console.error("Error:", err));
</script>

</body>
</html>
