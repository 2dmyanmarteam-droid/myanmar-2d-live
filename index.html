<!DOCTYPE html>
<html lang="my">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thai 2D Calendar Sheet</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      font-family: 'Pyidaungsu', 'Myanmar Text', sans-serif; 
      background: #e8ecef; 
      padding: 10px; 
    }
    .container {
      max-width: 100%;
      background: #fff;
      border: 1px solid #999;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      overflow: hidden;
      border-radius: 8px;
    }
    .header {
      background: linear-gradient(135deg, #003366 0%, #0055aa 100%);
      color: #fff;
      text-align: center;
      padding: 12px;
      font-weight: bold;
      font-size: 15px;
      letter-spacing: 1px;
    }
    .toggle-buttons {
      display: flex;
      background: #f0f0f0;
      padding: 8px;
      gap: 10px;
      justify-content: center;
      border-bottom: 1px solid #ddd;
    }
    .toggle-btn {
      flex: 1;
      max-width: 220px;
      padding: 10px;
      border: 2px solid #003366;
      background: #fff;
      color: #003366;
      font-weight: bold;
      cursor: pointer;
      border-radius: 6px;
    }
    .toggle-btn.active {
      background: #003366;
      color: #fff;
    }
    .table-wrapper {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .trade-table {
      border-collapse: collapse;
      width: 100%;
      min-width: 1800px;
      font-size: 10px;
    }
    .trade-table th, .trade-table td {
      border: 1px solid #c0d0e0;
      padding: 3px 2px;
      text-align: center;
      white-space: nowrap;
      min-width: 28px;
    }
    .trade-table th {
      background: #003366;
      color: #fff;
      font-weight: bold;
      height: 28px;
      font-size: 10px;
      position: sticky;
      top: 0;
      z-index: 2;
    }
    .day-col {
      position: sticky;
      left: 0;
      background: #003366;
      color: #fff;
      font-weight: bold;
      z-index: 3;
      min-width: 80px;
      text-align: center !important;
      border-right: 2px solid #002244;
    }
    .trade-table thead .day-col { z-index: 4; }
    .num-cell {
      font-family: monospace;
      font-weight: bold;
      font-size: 10px;
      color: #d93025;
      background: #fff;
    }
    .mobile-hint {
      text-align: center;
      font-size: 11px;
      color: #666;
      padding: 6px;
      background: #f9f9f9;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="header">SPECIAL THAI TWO DIGIT NUMBERS CALENDAR (နံနက် 9:30 AM)</div>
  <div class="toggle-buttons">
    <button class="toggle-btn active">☀️ နံနက် (9:30 AM)</button>
    <button class="toggle-btn">🌙 ညနေ (4:30 PM)</button>
  </div>
  <div class="table-wrapper">
    <table class="trade-table" id="calendarTable">
      <thead>
        <tr id="headerRow">
          <th class="day-col">DAY</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
  <div class="mobile-hint">📱 ယားကျယ်သဖြင့် ညာဘက်သို့ လက်နဲ့ဆွဲကြည့်ပါ</div>
</div>

  // ဇွန်လ ၂၀၂၆ ရက်စွဲများ (Mon-Fri only)
  const year = 2026;
  const month = 5; // June (0-indexed)
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  
  const dayNames = ['','','တနင်္လာ','အင်္ဂါ','ဗုဒ္ဓဟူး','ကြာသပတေး','သောကြာ'];
  let workingDays = [];
  
  // အလုပ်လုပ်ရက်များ စုဆောင်းခြင်း
  for(let d=1; d<=daysInMonth; d++) {
    const dateObj = new Date(year, month, d);
    const dow = dateObj.getDay();
    
    if(dow >= 1 && dow <= 5) {
      workingDays.push({ date: d, dayName: dayNames[dow] });
    }
  }

  const MAX_COLS = 58;

  // ကော်လံ ေါင်းစဉ် ၁-၅၈
  const headerRow = document.getElementById('headerRow');
  for(let i=1; i<=MAX_COLS; i++) {
    headerRow.innerHTML += `<th>${i}</th>`;
  }

  const tbody = document.getElementById('tableBody');
  
  // Row 20 အထိ ဖြည့်ခြင်း (ရက်စွဲနဲ့ ကိုက်ညီအောင်)
  for(let row=0; row<20; row++) {
    const tr = document.createElement('tr');
    
    // ပထမကော်လံ (ရက်စွဲ + နေ့)
    const dayTd = document.createElement('td');
    dayTd.className = 'day-col';
    const dayInfo = workingDays[row] || { date: '-', dayName: '' };
    dayTd.innerHTML = `${row+1}<br><small style="font-size:9px">${dayInfo.date} ${dayInfo.dayName}</small>`;
    tr.appendChild(dayTd);
    
    // ဂဏန်းများ (ပုံထဲက data)
    for(let col=0; col<MAX_COLS; col++) {

      td.className = 'num-cell';
      td.textContent = morningData[row][col] !== undefined ? String(morningData[row][col]).padStart(2,'0') : '';
      tr.appendChild(td);
    }
    tbody.appendChild(tr);
  }

</body>
</html>
