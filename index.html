<!DOCTYPE html>
<html lang="my">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thai 2D Calendar Sheet</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      font-family: 'Pyidaungsu', 'Myanmar Text', sans-serif; 
      background: #e8ecef; 
      padding: 10px; 
    }
    
    .container {
      max-width: 100%;
      background: #fff;
      border: 1px solid #999;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      overflow: hidden;
      border-radius: 8px;
    }

    .header {
      background: linear-gradient(135deg, #003366 0%, #0055aa 100%);
      color: #fff;
      text-align: center;
      padding: 12px;
      font-weight: bold;
      font-size: 15px;
      letter-spacing: 1px;
    }

    .toggle-buttons {
      display: flex;
      background: #f0f0f0;
      padding: 8px;
      gap: 10px;
      justify-content: center;
      border-bottom: 1px solid #ddd;
    }

    .toggle-btn {
      flex: 1;
      max-width: 220px;
      padding: 10px;
      border: 2px solid #003366;
      background: #fff;
      color: #003366;
      font-weight: bold;
      cursor: pointer;
      border-radius: 6px;
    }

    .toggle-btn.active {
      background: #003366;
      color: #fff;
    }

    .table-wrapper {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    .trade-table {
      border-collapse: collapse;
      width: 100%;
      min-width: 1400px;
      font-size: 11px;
    }

    .trade-table th, .trade-table td {
      border: 1px solid #c0d0e0;
      padding: 4px 3px;
      text-align: center;
      white-space: nowrap;
      min-width: 32px;
    }

    .trade-table th {
      background: #003366;
      color: #fff;
      font-weight: bold;
      height: 30px;
      font-size: 11px;
      position: sticky;
      top: 0;
      z-index: 2;
    }

    .day-col {
      position: sticky;
      left: 0;
      background: #003366;
      color: #fff;
      font-weight: bold;
      z-index: 3;
      min-width: 70px;
      text-align: center !important;
      border-right: 2px solid #002244;
    }

    .trade-table thead .day-col {
      z-index: 4;
    }

    .num-cell {
      font-family: monospace;
      font-weight: bold;
      font-size: 11px;
      color: #111;
      background: #fff;
    }
    
    .num-cell.evening {
      color: #008000;
    }

    .mobile-hint {
      text-align: center;
      font-size: 11px;
      color: #666;
      padding: 6px;
      background: #f9f9f9;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="header">SPECIAL THAI TWO DIGIT NUMBERS CALENDAR</div>
  
  <div class="toggle-buttons">
    <button class="toggle-btn active" onclick="switchView('morning', this)">☀️ နံနက် (9:30 AM)</button>
    <button class="toggle-btn" onclick="switchView('evening', this)">🌙 ညနေ (4:30 PM)</button>
  </div>

  <div class="table-wrapper">
    <table class="trade-table" id="calendarTable">
      <thead>
        <tr id="headerRow">
          <th class="day-col">DAY</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
  
  <div class="mobile-hint">📱 ဇယားကျယ်သဖြင့် ညာဘက်သို့ လက်နဲ့ဆွဲကြည့်ပါ</div>
</div>

<script>
  const JSON_URL = "https://raw.githubusercontent.com/2dmyanmarteam-droid/myanmar-2d-live/main/data/calendar-data.json";
  let currentData = {};
  let currentView = 'morning';
  
  const myanDayNames = ['','တနင်္လာ', 'အင်္ဂါ', 'ဗုဒ္ဓဟူး', 'ကြာသပတေး', 'သောကြာ'];
  const TOTAL_ROWS = 20;
  const MAX_COLS = 60;

  // ✅ ကော်လံ ေါင်းစဉ် -၆၀ ထည့်ခြင်း
  const headerRow = document.getElementById('headerRow');
  for(let i=1; i<=MAX_COLS; i++) {
    headerRow.innerHTML += `<th>${i}</th>`;
  }

  function switchView(view, btn) {
    currentView = view;
    document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    buildTable();
  }

  function buildTable() {
    const tbody = document.getElementById('tableBody');
    tbody.innerHTML = '';
    
    // ✅ အလုပ်လုပ်ရက်များ စုဆောင်းခြင်း (စနေ/တနင်္ဂနွေ ြုတ်)
    let workingDays = [];
    const year = 2026;
    const month = 5; // June
    const daysInMonth = new Date(year, month + 1, 0).getDate();

    for(let d=1; d<=daysInMonth; d++) {
      const dateObj = new Date(year, month, d);
      const dow = dateObj.getDay();
      
      // စနေ(6) နဲ့ တနင်္ဂနွေ(0) ဖြုတ်
      if(dow === 0 || dow === 6) continue;
      
      const dateKey = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const info = currentData[dateKey] || {};
      
      let numbers = (currentView === 'morning') 
        ? (info.morning?.set || []) 
        : (info.evening?.set || []);
      
      workingDays.push({ day: d, dow: dow, numbers: numbers });
    }
    
    // ✅ ၂၀ ROW အထိ ပြခြင်း - CIRCULAR (ပြန်လည်အသုံးပြု)
    const actualDays = workingDays.length;
    
    if(actualDays === 0) {
      tbody.innerHTML = '<tr><td colspan="61" style="padding:20px">ဒေတာ မရှိသေးပါ</td></tr>';
      return;
    }
    
    for(let row=0; row<TOTAL_ROWS; row++) {
      // ✅ CIRCULAR: row ကို actualDays နဲ့ စားပြီး အကြွင်းယူ
      // row=0 → 0%4=0, row=4 → 4%4=0, row=5 → 5%4=1...
      const dataIndex = row % actualDays;
      const dayData = workingDays[dataIndex];
      
      const tr = document.createElement('tr');
      
      // ပထမကော်လံ (DAY Label) - row+1 (1-20)
      const dayTd = document.createElement('td');
      dayTd.className = 'day-col';
      dayTd.innerHTML = `${row + 1}<br><small style="font-size:9px">${myanDayNames[dayData.dow]}</small>`;
      tr.appendChild(dayTd);
      
      // ဏန်းများ (1-60)
      for(let col=1; col<=MAX_COLS; col++) {
        const td = document.createElement('td');
        td.className = 'num-cell' + (currentView === 'evening' ? ' evening' : '');
        td.textContent = dayData.numbers[col-1] || '';
        tr.appendChild(td);
      }
      
      tbody.appendChild(tr);
    }
  }

  fetch(JSON_URL)
    .then(res => res.json())
    .then(data => {
      currentData = data;
      buildTable();
    })
    .catch(err => console.error("Error:", err));
</script>

</body>
</html>
